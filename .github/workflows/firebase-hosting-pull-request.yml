name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      # https://github.com/FirebaseExtended/action-hosting-deploy/issues/460
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pinned exact: Node 24.17.0 has an http.Agent regression that makes
          # node-fetch (used by firebase-tools' bundled google-auth-library) throw
          # "Premature close" on the sts.googleapis.com token exchange, breaking
          # WIF-authenticated deploys. Fixed in 24.18.0. A bare '24' is not enough
          # — setup-node serves the runner-cached 24.17.0. Bump/relax once newer
          # 24.x are uniformly safe. See nodejs/node#63989 (fix: #64004).
          node-version: '24.18.0'
      - uses: actions/checkout@v6
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HIDE_AND_SEEK_64012 }}
          projectId: hide-and-seek-64012
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
